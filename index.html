<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>

<h1>IMAGE GALLERY</h1>

<p>Moments that stay forever</p>

<div class="line"></div>

</header>

<div class="buttons">

<button class="active" onclick="filterImages('all')">ALL</button>

<button onclick="filterImages('nature')">NATURE</button>

<button onclick="filterImages('city')">CITY</button>

<button onclick="filterImages('friends')">FRIENDS</button>

<button onclick="filterImages('family')">FAMILY</button>

<button onclick="filterImages('cousin')">COUSINS</button>

</div>

<div class="gallery"></div>

<div class="load">

<button id="loadBtn">LOAD MORE</button>

</div>

</div>



<div class="lightbox">

<button class="close">
<i class="ri-close-line"></i>
</button>

<button class="prev">
<i class="ri-arrow-left-s-line"></i>
</button>

<img class="big-img">

<button class="next">
<i class="ri-arrow-right-s-line"></i>
</button>

</div>

<script src="script.js"></script>

</body>
    

</html>
